# Netlify deploys the production build when this repo is connected in the Netlify UI.
# Full checks (audit, lint, typecheck, tests) run in GitHub Actions — see .github/workflows/ci.yml
#
# Admin: enable Netlify Identity in the Netlify UI (Identity → Enable Identity), invite users,
# and optionally set REACT_APP_NETLIFY_IDENTITY_URL for branch previews or local dev (see .env.example).

[build]
  publish = "build"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"
